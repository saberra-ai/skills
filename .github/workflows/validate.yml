name: validate

# The substrate that makes the doctrine self-checking: every push/PR runs the
# verification runner against the Agent Skills contract, with the self-test that
# proves the runner has teeth. A malformed skill, a broken cross-link, or a drifted
# install slug fails the build — not silently.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify (self-test proves teeth, then validate the repo)
        run: node scripts/validate.mjs --self-test
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.json
